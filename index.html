<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Test</title></head>
<body style="background:#0d1117;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
<h1>FieldBid Test</h1>
<p id="msg" style="color:#7d8590">Tap the button</p>
<button id="btn" style="margin-top:20px;padding:20px 40px;background:#3fb950;color:#000;border:none;border-radius:12px;font-size:18px;font-weight:700">Tap Me</button>
<script>
document.getElementById('btn').addEventListener('click', function() {
  document.getElementById('msg').textContent = 'WORKS! Touch is responding.';
  document.getElementById('msg').style.color = '#3fb950';
});
</script>
</body>
</html>
