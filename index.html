<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3fb950">
<link rel="manifest" href="manifest.json">
<title>FieldBid</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;color:#e6edf3;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:14px;}
.mode-btn{width:100%;max-width:420px;padding:20px 18px;border-radius:14px;text-align:left;border:none;transition:transform .1s;}
.mode-btn.field{background:linear-gradient(145deg,#1c1500,#2e2200);border:1px solid rgba(240,160,44,.35);}
.mode-btn.est{background:linear-gradient(145deg,#091510,#0d2918);border:1px solid rgba(63,185,80,.35);}
.mode-title{font-size:20px;font-weight:800;}
.field .mode-title{color:#f0a02c;}
.est .mode-title{color:#3fb950;}
.mode-desc{font-size:13px;color:#7d8590;margin-top:8px;}
#status{font-size:14px;color:#3fb950;min-height:24px;text-align:center;}
</style>
</head>
<body>
<img src="icon-192.png" style="width:80px;height:80px;border-radius:20px;margin-bottom:8px">
<div style="font-size:28px;font-weight:800;letter-spacing:-1px">FieldBid</div>
<div style="font-size:11px;color:#7d8590;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px">by Green Idea Insulation</div>

<div id="status">Loading...</div>

<button class="mode-btn field" id="btnField">
  <div class="mode-title">📐 Field Takeoff</div>
  <div class="mode-desc">Measure areas on-site. No pricing.</div>
</button>

<button class="mode-btn est" id="btnEst">
  <div class="mode-title">💼 Estimator</div>
  <div class="mode-desc">Build quotes and contracts.</div>
</button>

<script>
window.addEventListener('load', function() {
  document.getElementById('status').textContent = 'Ready — tap a button';
  document.getElementById('status').style.color = '#58a6ff';

  document.getElementById('btnField').addEventListener('click', function() {
    document.getElementById('status').textContent = '✅ Field Takeoff works!';
    document.getElementById('status').style.color = '#f0a02c';
  });

  document.getElementById('btnEst').addEventListener('click', function() {
    document.getElementById('status').textContent = '✅ Estimator works!';
    document.getElementById('status').style.color = '#3fb950';
  });
});
</script>
</body>
</html>
