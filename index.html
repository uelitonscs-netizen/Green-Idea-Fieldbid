<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldBid</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: sans-serif; }

#home { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; gap: 16px; }
#field-app, #est-app { display: none; }
#field-app.show, #est-app.show { display: block; }

h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
p { color: #7d8590; font-size: 13px; }

.card {
  width: 100%; max-width: 400px;
  padding: 24px 20px;
  border-radius: 14px;
  border: none;
  text-align: left;
  cursor: pointer;
  font-family: sans-serif;
}
.card-field { background: #2e2200; border: 1px solid rgba(240,160,44,.4); }
.card-est   { background: #0d2918; border: 1px solid rgba(63,185,80,.4); }
.card h2 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.card-field h2 { color: #f0a02c; }
.card-est   h2 { color: #3fb950; }
.card p { color: #7d8590; font-size: 13px; margin-top: 6px; }

.header { background: #161b22; border-bottom: 1px solid #2a3340; padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; }
.back { background: #1e2530; border: 1px solid #2a3340; border-radius: 8px; padding: 8px 12px; color: #e6edf3; font-family: sans-serif; font-size: 14px; cursor: pointer; }
.content { padding: 20px 16px; }
.big { font-size: 22px; font-weight: 800; color: #e6edf3; }
</style>
</head>
<body>

<div id="home">
  <div style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">🌿</div>
    <h1>FieldBid</h1>
    <p>by Green Idea Insulation</p>
  </div>

  <button class="card card-field" id="btnField">
    <h2>📐 Field Takeoff</h2>
    <p>Measure areas on-site. No pricing involved.</p>
  </button>

  <button class="card card-est" id="btnEst">
    <h2>💼 Estimator</h2>
    <p>Build quotes and contracts.</p>
  </button>
</div>

<div id="field-app">
  <div class="header">
    <button class="back" id="backField">← Back</button>
    <span class="big">Field Takeoff</span>
  </div>
  <div class="content">
    <p style="color:#7d8590">Field Takeoff mode. Coming soon.</p>
  </div>
</div>

<div id="est-app">
  <div class="header">
    <button class="back" id="backEst">← Back</button>
    <span class="big">Estimator</span>
  </div>
  <div class="content">
    <p style="color:#7d8590">Estimator mode. Coming soon.</p>
  </div>
</div>

<script>
document.getElementById('btnField').addEventListener('click', function() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('field-app').style.display = 'block';
});

document.getElementById('btnEst').addEventListener('click', function() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('est-app').style.display = 'block';
});

document.getElementById('backField').addEventListener('click', function() {
  document.getElementById('field-app').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
});

document.getElementById('backEst').addEventListener('click', function() {
  document.getElementById('est-app').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
});
</script>
</body>
</html>
