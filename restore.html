<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>FieldBid Tools</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:system-ui;background:#0d1117;color:#e6edf3;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;}
.box{background:#161b22;border:1px solid #2a3340;border-radius:16px;padding:28px;max-width:440px;width:100%;text-align:center;}
h2{color:#3fb950;margin:0 0 8px;font-size:20px;}
p{color:#7d8590;font-size:12px;margin:0 0 16px;line-height:1.6;}
button{background:#3fb950;color:#000;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;}
button.sec{background:#1a3a2a;color:#3fb950;border:1px solid #3fb950;}
button:disabled{background:#2a3340;color:#4d5560;}
#log{margin-top:12px;font-size:12px;text-align:left;line-height:2;}
.ok{color:#3fb950;}.err{color:#f85149;}.info{color:#58a6ff;}
hr{border:none;border-top:1px solid #2a3340;margin:12px 0;}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
<div class="box">
  <h2>FieldBid Tools</h2>
  <p>Ferramentas de manutencao.</p>
  <button id="btnRestore">Restaurar Dados do Firebase</button>
  <button id="btnTest" class="sec">Testar Firebase Write</button>
  <hr>
  <div id="log"></div>
</div>
<script>
function log(m,c){document.getElementById("log").innerHTML+="<div class='"+(c||"info")+"'>"+m+"</div>";}
function clearLog(){document.getElementById("log").innerHTML="";}

var _db=null,_auth=null;
function initFB(cb){
  if(_db){cb();return;}
  try{
    var app=firebase.initializeApp({apiKey:"AIzaSyBHQWTKirZQZ_ua9chnaLy7lnXi0KDygPA",authDomain:"work-log-5aa9f.firebaseapp.com",projectId:"work-log-5aa9f"},"tools_"+Date.now());
    _db=firebase.firestore(app);
    _auth=firebase.auth(app);
    _auth.signInAnonymously().then(function(){cb();}).catch(function(){cb();});
  }catch(e){log("FB erro: "+e.message,"err");}
}

document.getElementById("btnRestore").addEventListener("click",function(){
  var btn=document.getElementById("btnRestore");
  btn.disabled=true;clearLog();
  log("Limpando localStorage...");
  ["fb6_fa","fb6_ei","fb6_projs","fb6_cfg","fb6_pr","fb6_qi","fb6_qn","fb6_ct","fb6_sg","fb6_wc"].forEach(function(k){localStorage.removeItem(k);});
  log("localStorage limpo","ok");
  initFB(function(){
    var fa=null,projs=null,ei=null,done=0;
    function fin(){
      done++;if(done<3)return;
      var got=0;
      if(projs&&projs.length>0){localStorage.setItem("fb6_projs",JSON.stringify(projs));got++;log("Projetos: "+projs.length,"ok");}
      if(fa&&fa.length>0){
        localStorage.setItem("fb6_fa",JSON.stringify(fa));got++;log("Areas: "+fa.length,"ok");
        if(!projs||projs.length===0){
          var rp={id:"p_recovered",name:"Recovered Areas",areas:fa,created:new Date().toLocaleDateString("en-US")};
          localStorage.setItem("fb6_projs",JSON.stringify([rp]));log("Projeto Recovered criado","ok");
        }
      }
      if(ei&&ei.length>0){localStorage.setItem("fb6_ei",JSON.stringify(ei));got++;log("Estimator: "+ei.length,"ok");}
      if(got>0){
        log("Restauracao completa!","ok");
        btn.textContent="Abrir FieldBid";btn.disabled=false;
        btn.onclick=function(){window.location.href="/Green-Idea-Fieldbid/";};
      } else {log("Nenhum dado encontrado","err");btn.disabled=false;}
    }
    _db.collection("fieldbid_data").doc("fa").get().then(function(d){if(d.exists&&d.data().data){var a=JSON.parse(d.data().data);if(a&&a.length>0)fa=a;}fin();}).catch(function(){fin();});
    _db.collection("fieldbid_data").doc("projs").get().then(function(d){if(d.exists&&d.data().data){var a=JSON.parse(d.data().data);if(a&&a.length>0)projs=a;}fin();}).catch(function(){fin();});
    _db.collection("fieldbid_data").doc("ei").get().then(function(d){if(d.exists&&d.data().data){var a=JSON.parse(d.data().data);if(a&&a.length>0)ei=a;}fin();}).catch(function(){fin();});
  });
});

document.getElementById("btnTest").addEventListener("click",function(){
  var btn=document.getElementById("btnTest");
  btn.disabled=true;clearLog();
  initFB(function(){
    var ts=new Date().toISOString();
    _db.collection("fieldbid_data").doc("test_write").set({data:JSON.stringify([{test:true,ts:ts}]),updatedAt:ts})
      .then(function(){return _db.collection("fieldbid_data").doc("test_write").get();})
      .then(function(doc){
        if(doc.exists){log("FIREBASE OK! ts: "+doc.data().updatedAt.slice(11,19),"ok");}
        else{log("Erro: doc nao encontrado","err");}
        btn.disabled=false;
      }).catch(function(e){log("Erro: "+e.message,"err");btn.disabled=false;});
  });
});
</script>
</body>
</html>
