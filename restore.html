<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>FieldBid Restore</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:system-ui;background:#0d1117;color:#e6edf3;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;}
.box{background:#161b22;border:1px solid #2a3340;border-radius:16px;padding:28px;max-width:440px;width:100%;text-align:center;}
h2{color:#3fb950;margin:0 0 8px;font-size:20px;}
p{color:#7d8590;font-size:12px;margin:0 0 20px;line-height:1.6;}
button{background:#3fb950;color:#000;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;}
button:disabled{background:#2a3340;color:#4d5560;}
#log{margin-top:12px;font-size:12px;color:#7d8590;text-align:left;line-height:2;}
.ok{color:#3fb950;}.err{color:#f85149;}.info{color:#58a6ff;}
a.open-btn{display:block;background:#1a6b2a;color:#3fb950;border:1px solid #3fb950;border-radius:10px;padding:14px;font-size:15px;font-weight:700;text-decoration:none;margin-top:8px;}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
<div class="box">
  <h2>FieldBid Restore</h2>
  <p>Recupera suas areas e projetos<br>do Firebase para este dispositivo.</p>
  <button id="btn">Restaurar Dados</button>
  <div id="log"></div>
</div>
<script>
function log(m,c){document.getElementById("log").innerHTML+="<div class=\""+(c||"info")+"\">"+m+"</div>";}

document.getElementById("btn").addEventListener("click",function(){
  var btn=document.getElementById("btn");
  btn.disabled=true; btn.textContent="Conectando...";
  document.getElementById("log").innerHTML="";

  // Clear FieldBid localStorage
  var keys=['fb6_fa','fb6_ei','fb6_projs','fb6_cfg','fb6_pr','fb6_qi','fb6_qn','fb6_ct','fb6_sg','fb6_wc'];
  keys.forEach(function(k){ localStorage.removeItem(k); });
  log("LocalStorage limpo","ok");

  try{
    var app=firebase.initializeApp({
      apiKey:"AIzaSyBHQWTKirZQZ_ua9chnaLy7lnXi0KDygPA",
      authDomain:"work-log-5aa9f.firebaseapp.com",
      projectId:"work-log-5aa9f"
    },"restore");
    var db=firebase.firestore(app);
    var auth=firebase.auth(app);
    log("Firebase iniciado","info");

    auth.signInAnonymously()
      .then(function(){ log("Auth OK","info"); doRestore(db); })
      .catch(function(e){ log("Auth skipped: "+e.code,"info"); doRestore(db); });
  }catch(e){ log("Erro: "+e.message,"err"); btn.disabled=false; btn.textContent="Tentar novamente"; }
});

function doRestore(db){
  log("Buscando dados...","info");
  var fbFa=null, fbProjs=null, fbEi=null;
  var done=0, total=3;

  function fin(){
    done++;
    if(done<total) return;
    var got=0;

    if(fbProjs&&fbProjs.length>0){
      localStorage.setItem('fb6_projs',JSON.stringify(fbProjs));
      got++; log("Projetos: "+fbProjs.length+" restaurados","ok");
    }
    if(fbFa&&fbFa.length>0){
      localStorage.setItem('fb6_fa',JSON.stringify(fbFa));
      got++; log("Areas: "+fbFa.length+" restauradas","ok");
      if(!fbProjs||fbProjs.length===0){
        var rp={id:'p_recovered',name:'Recovered Areas',areas:fbFa,created:new Date().toLocaleDateString('en-US')};
        localStorage.setItem('fb6_projs',JSON.stringify([rp]));
        log("Projeto 'Recovered Areas' criado","ok");
      }
    } else {
      log("Nenhuma area encontrada no Firebase","err");
    }
    if(fbEi&&fbEi.length>0){
      localStorage.setItem('fb6_ei',JSON.stringify(fbEi));
      got++; log("Estimator: "+fbEi.length+" itens restaurados","ok");
    }

    if(got>0){
      log("Restauracao completa!","ok");
      var btn=document.getElementById("btn");
      btn.textContent="Abrir FieldBid";
      btn.disabled=false;
      btn.style.background="#16a34a";
      btn.addEventListener("click",function(){ window.location.href="https://uelitonscs-netizen.github.io/Green-Idea-Fieldbid/"; });
    } else {
      log("Nenhum dado encontrado","err");
      document.getElementById("btn").disabled=false;
      document.getElementById("btn").textContent="Tentar novamente";
    }
  }

  db.collection('fieldbid_data').doc('fa').get()
    .then(function(d){
      if(d.exists&&d.data()&&d.data().data){
        var arr=JSON.parse(d.data().data);
        if(arr&&arr.length>0){ fbFa=arr; log("fa: "+arr.length+" areas","info"); }
        else{ log("fa: vazio","info"); }
      } else { log("fa: nao encontrado","info"); }
      fin();
    }).catch(function(e){ log("Erro fa: "+e.message,"err"); fin(); });

  db.collection('fieldbid_data').doc('projs').get()
    .then(function(d){
      if(d.exists&&d.data()&&d.data().data){
        var arr=JSON.parse(d.data().data);
        if(arr&&arr.length>0){ fbProjs=arr; log("projs: "+arr.length,"info"); }
        else{ log("projs: vazio","info"); }
      } else { log("projs: nao encontrado","info"); }
      fin();
    }).catch(function(e){ log("Erro projs: "+e.message,"err"); fin(); });

  db.collection('fieldbid_data').doc('ei').get()
    .then(function(d){
      if(d.exists&&d.data()&&d.data().data){
        var arr=JSON.parse(d.data().data);
        if(arr&&arr.length>0){ fbEi=arr; log("ei: "+arr.length,"info"); }
      }
      fin();
    }).catch(function(e){ log("Erro ei: "+e.message,"err"); fin(); });
}
</script>
</body>
</html>
